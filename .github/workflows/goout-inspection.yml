name: 深圳亲子活动日历 - 数据质量巡检

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因'
        required: false
        default: '手动触发'
  push:
    branches:
      - main
    paths:
      - 'inspector.py'
      - '.github/workflows/goout-inspection.yml'

permissions:
  contents: write
  actions: read

jobs:
  inspection:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests 2>/dev/null || true

      - name: 运行巡检
        id: inspection
        run: |
          python inspector.py
          echo "report_file=$(ls -t reports/inspection-*.md | head -1)" >> $GITHUB_OUTPUT
          echo "report_filename=$(ls -t reports/inspection-*.md | head -1 | xargs basename)" >> $GITHUB_OUTPUT

      - name: 上传巡检报告
        uses: actions/upload-artifact@v4
        with:
          name: inspection-report
          path: reports/latest.md
          retention-days: 30

      - name: 提交历史数据更新
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          git diff --staged --quiet || git commit -m "chore: 更新巡检数据与报告 [skip ci]"
          git push

      - name: 创建巡检 Issue 到 goout 仓库
        env:
          GOOUT_PAT: ${{ secrets.GOOUT_PAT }}
        run: python3 sync_issue.py

      - name: 巡检摘要
        run: |
          echo "### 巡检完成" >> $GITHUB_STEP_SUMMARY
          echo "报告文件: $(ls -t reports/inspection-*.md | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          head -80 reports/latest.md >> $GITHUB_STEP_SUMMARY